<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 韩语字母之旅 - DEBUG</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Barlow:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        #debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            z-index: 999999;
            max-width: 400px;
            max-height: 300px;
            overflow: auto;
        }
        .error { color: #f00; }
        .success { color: #0f0; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">
    <div id="game-container"></div>
    <div id="debug-panel">
        <strong>DEBUG LOG:</strong><br>
        <div id="debug-log"></div>
    </div>

    <script>
        const debugLog = document.getElementById('debug-log');
        function log(msg, type='info') {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if (type === 'error') div.className = 'error';
            if (type === 'success') div.className = 'success';
            debugLog.appendChild(div);
            console.log(msg);
        }

        log('页面开始加载...');
        
        // 检查Phaser加载
        window.addEventListener('load', () => {
            log('window.load 触发');
            if (typeof Phaser !== 'undefined') {
                log('✅ Phaser已加载: ' + Phaser.VERSION, 'success');
            } else {
                log('❌ Phaser未加载！', 'error');
            }
        });

        // 捕获全局错误
        window.onerror = function(msg, url, line) {
            log(`❌ 错误: ${msg} (${url}:${line})`, 'error');
            return true;
        };

        window.addEventListener('unhandledrejection', function(event) {
            log(`❌ Promise拒绝: ${event.reason}`, 'error');
        });
    </script>

    <!-- 加载脚本 -->
    <script src="content.js"></script>
    <script src="storage.js"></script>
    <script src="sag-integration.js"></script>
    <script src="progress-handler.js"></script>
    <script src="test-runner.js"></script>
    <link rel="stylesheet" href="mobile.css">
    <script src="game.js"></script>

    <script>
        log('所有脚本标签已添加');
        // 检查HANGUL_DATA
        setTimeout(() => {
            if (typeof HANGUL_DATA !== 'undefined') {
                log(`✅ HANGUL_DATA已加载 (${HANGUL_DATA.length}个字母)`, 'success');
            } else {
                log('❌ HANGUL_DATA未定义！', 'error');
            }
        }, 1000);
    </script>
</body>
</html>
